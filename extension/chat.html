<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Claude — Chromium Bridge</title>
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <header id="header">
    <div id="title">
      <span id="logo">✳</span>
      <span>Claude</span>
    </div>
    <div id="header-actions">
      <select id="model" title="Model">
        <option value="">Default</option>
        <option value="claude-fable-5[1m]">Fable 5</option>
        <option value="opus">Opus</option>
        <option value="sonnet">Sonnet</option>
        <option value="haiku">Haiku</option>
      </select>
      <button id="history" title="Chat history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 1.8"/></svg></button>
      <button id="new-chat" title="New chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </div>
  </header>

  <div id="history-panel" hidden>
    <div id="history-list"></div>
  </div>

  <div id="status-bar" hidden></div>

  <main id="messages"></main>

  <div id="attach-strip"></div>

  <div id="ask-bar">
    <label><input type="checkbox" id="ask-mode"> <span id="ask-label">Ask before acting</span></label>
    <select id="lang" title="Language">
      <option value="auto">Auto</option>
      <option value="en">English</option>
      <option value="ru">Русский</option>
    </select>
  </div>

  <footer id="composer">
    <textarea id="input" rows="1" placeholder="Ask about your open tabs…"></textarea>
    <button id="send" title="Send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M6 11l6-6 6 6"/></svg></button>
    <button id="stop" title="Stop" hidden><svg viewBox="0 0 12 12"><rect x="1" y="1" width="10" height="10" rx="2" fill="currentColor"/></svg></button>
  </footer>

  <script src="chat.js"></script>
</body>
</html>
